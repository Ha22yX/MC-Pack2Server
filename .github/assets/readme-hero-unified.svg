      <stop offset="1" stop-color="#eef8f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#18362d" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1120" height="420" rx="34" fill="url(#bg)"/>
